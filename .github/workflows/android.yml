name: Build APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:   # umožní spustit build ručně z webu GitHubu

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout zdrojového kódu
        uses: actions/checkout@v4

      - name: Nastavení JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Cache Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Práva pro gradlew
        run: chmod +x ./gradlew

      - name: Sestavení debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Nahrání APK jako artefakt
        uses: actions/upload-artifact@v4
        with:
          name: rfid-go-gps-apk
          path: app/build/outputs/apk/debug/rfid_go_gps.apk
          if-no-files-found: error
