name: Build APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
  # Po mergi běží build + bump v jednom běhu. Samostatný bump commit (chore: bump version)
  # už jen aktualizuje version.properties – znovu nesestavovat.
    if: >-
      github.event_name != 'push' ||
      !startsWith(github.event.head_commit.message, 'chore: bump version')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout zdrojového kódu
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Zvýšení verze (jen merge do main)
        if: github.event_name == 'push'
        id: bump
        run: |
          FILE=version.properties
          CODE=$(grep -oP '^APP_VERSION_CODE=\K\d+' "$FILE")
          NAME=$(grep -oP '^APP_VERSION_NAME=\K.*' "$FILE")

          NEW_CODE=$((CODE + 1))

          IFS='.' read -ra PARTS <<< "$NAME"
          LAST_IDX=$((${#PARTS[@]} - 1))
          PARTS[$LAST_IDX]=$((PARTS[$LAST_IDX] + 1))
          NEW_NAME=$(IFS='.'; echo "${PARTS[*]}")

          sed -i "s/^APP_VERSION_CODE=.*/APP_VERSION_CODE=$NEW_CODE/" "$FILE"
          sed -i "s/^APP_VERSION_NAME=.*/APP_VERSION_NAME=$NEW_NAME/" "$FILE"

          echo "version_code=$NEW_CODE" >> "$GITHUB_OUTPUT"
          echo "version_name=$NEW_NAME" >> "$GITHUB_OUTPUT"
          echo "Bumped versionCode $CODE -> $NEW_CODE, versionName $NAME -> $NEW_NAME"

      - name: Nastavení JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Cache Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Práva pro gradlew
        run: chmod +x ./gradlew

      - name: Načtení verze
        id: version
        run: |
          VERSION_NAME=$(grep -oP '^APP_VERSION_NAME=\K.*' version.properties)
          echo "name=$VERSION_NAME" >> "$GITHUB_OUTPUT"
          echo "Building version $VERSION_NAME"

      - name: Sestavení debug APK
        run: ./gradlew assembleDebug :preindex:jar --stacktrace

      - name: Nahrání APK jako artefakt
        uses: actions/upload-artifact@v4
        with:
          name: rfid-go-gps-${{ steps.version.outputs.name }}
          path: |
            app/build/outputs/apk/debug/rfid_go_gps_${{ steps.version.outputs.name }}.apk
            preindex/build/libs/preindex-dzs-1.0.jar
          if-no-files-found: error

      - name: Commit a push verze
        if: github.event_name == 'push'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          VERSION="${{ steps.bump.outputs.version_name }}"
          git add version.properties
          git commit -m "chore: bump version to $VERSION"
          git push

      - name: Vytvoření GitHub Release s APK
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.bump.outputs.version_name }}
          name: RFID Go GPS ${{ steps.bump.outputs.version_name }}
          body: Automaticky sestaveno po mergi do main.
          files: |
            app/build/outputs/apk/debug/rfid_go_gps_${{ steps.bump.outputs.version_name }}.apk
            preindex/build/libs/preindex-dzs-1.0.jar
          make_latest: true
